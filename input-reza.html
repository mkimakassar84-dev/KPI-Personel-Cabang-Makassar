<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Input Kinerja Harian - REZA</title>
<style>
  :root{
    --navy:#1c2733;
    --card:#ffffff;
    --bg:#eef1f5;
    --blue:#5b7fa6;
    --blue-dark:#3b5a7d;
    --green:#3fae63;
    --red:#e05a4e;
    --gray:#9aa5b1;
    --radius:18px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--navy); min-height:100vh;
  }
  .topbar{
    background:var(--navy); color:#fff; padding:16px 20px 40px;
    font-size:13px; letter-spacing:.3px;
  }
  .topbar .nama{font-size:19px; font-weight:700; margin-bottom:2px;}
  .topbar .jabatan{font-size:12px; opacity:.85; margin-bottom:4px;}
  .perf-badge{
    display:inline-block; font-size:10px; font-weight:800; letter-spacing:.3px;
    padding:3px 9px; border-radius:20px; vertical-align:middle; margin-left:4px;
  }
  .perf-badge.sb{ background:#e4f6ea; color:var(--green); }
  .perf-badge.b{ background:#eaf1fb; color:var(--blue); }
  .perf-badge.c{ background:#fdf3e2; color:#a97417; }
  .topbar .sub{opacity:.6; font-size:11px;}
  .wrap{max-width:480px; margin:-26px auto 0; padding:0 16px 100px;}
  .card{
    background:var(--card); border-radius:var(--radius); padding:18px 18px 20px;
    margin-bottom:14px; box-shadow:0 6px 18px rgba(20,30,45,.08);
  }
  .card h3{
    margin:0 0 14px; font-size:12px; letter-spacing:1px; text-transform:uppercase;
    color:var(--blue-dark); font-weight:700;
  }
  label{display:block; font-size:13px; color:#5b6672; margin-bottom:6px;}
  input[type=date], input[type=text].jam{
    width:100%; padding:14px 12px; border-radius:12px; border:1.5px solid #dde2e8;
    font-size:16px; background:#fbfcfd; color:var(--navy); font-weight:600;
  }
  input[type=text].jam{ text-align:center; letter-spacing:1px; }
  input:disabled, select:disabled{ opacity:.6; }
  input[type=date]:focus, input[type=text].jam:focus{outline:none; border-color:var(--blue);}
  .row2{display:flex; gap:12px;}
  .row2 > div{flex:1;}
  .status-pill{
    display:inline-block; margin-top:8px; font-size:11px; font-weight:700;
    padding:4px 10px; border-radius:20px; letter-spacing:.3px;
  }
  .ok{background:#e4f6ea; color:var(--green);}
  .no{background:#fdecea; color:var(--red);}
  .item{
    padding:12px 0; border-bottom:1px solid #eef0f3;
  }
  .item:last-child{border-bottom:none;}
  .item-row{ display:flex; align-items:center; justify-content:space-between; }
  .item-row-yn{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .item[data-warn="1"]{ background:#fffaf0; margin:0 -18px; padding:12px 18px; border-radius:10px; }
  .yn-group{ display:flex; gap:6px; flex:0 0 auto; }
  .yn-btn{
    min-width:58px; padding:9px 12px; border-radius:10px; border:1.5px solid #dde2e8;
    background:#fbfcfd; color:#8b94a0; font-size:12px; font-weight:700; letter-spacing:.3px;
    cursor:pointer; -webkit-tap-highlight-color:transparent; transition:.15s;
  }
  .yn-btn.yn-tidak.active{ background:#fdecea; border-color:var(--red); color:var(--red); }
  .yn-btn.yn-ya.active{ background:#e4f6ea; border-color:var(--green); color:var(--green); }
  .warn-hint{ font-size:11px; color:#a05a00; margin-top:4px; display:flex; align-items:center; gap:4px; }
  .item .txt{font-size:14px; padding-right:12px; line-height:1.35;}
  .item .num{
    display:inline-block; width:20px; height:20px; border-radius:50%; background:#eef1f5;
    color:var(--blue-dark); font-size:11px; font-weight:700; text-align:center; line-height:20px;
    margin-right:8px;
  }
  .switch{ position:relative; width:46px; height:27px; flex:0 0 auto; }
  .switch input{opacity:0; width:0; height:0;}
  .slider{
    position:absolute; cursor:pointer; inset:0; background:#d7dce2; border-radius:27px;
    transition:.2s;
  }
  .slider:before{
    content:""; position:absolute; height:21px; width:21px; left:3px; top:3px;
    background:#fff; border-radius:50%; transition:.2s; box-shadow:0 1px 3px rgba(0,0,0,.2);
  }
  input:checked + .slider{background:var(--blue);}
  input:checked + .slider:before{transform:translateX(19px);}
  .switch.locked .slider{opacity:.55; cursor:not-allowed;}
  .hint{font-size:11px; color:var(--gray); margin-top:2px;}

  .fields-wrap{ margin-top:10px; display:none; border-top:1px dashed #e6e9ee; padding-top:10px; }
  .fields-wrap.show{ display:block; }
  .row-card{ margin-bottom:12px; padding-bottom:12px; border-bottom:1px dashed #eef0f3; }
  .row-card:last-child{ border-bottom:none; margin-bottom:0; padding-bottom:0; }
  .row-label{ font-size:10px; font-weight:700; color:var(--gray); text-transform:uppercase; letter-spacing:.4px; margin-bottom:8px; }
  .field-item{ margin-bottom:10px; }
  .field-item:last-child{ margin-bottom:0; }
  .field-label{ font-size:11px; color:var(--blue-dark); font-weight:700; margin-bottom:5px; display:flex; align-items:center; gap:4px; }
  .field-label .req{ color:var(--red); }
  .field-label .opt{ color:var(--gray); font-size:10px; font-weight:600; }
  .field-item input[type=text], .field-item select{
    width:100%; padding:10px 12px; border-radius:10px; border:1.5px solid #dde2e8;
    font-size:13px; font-family:inherit; background:#fbfcfd; color:var(--navy);
  }
  .field-item input[type=text]:focus, .field-item select:focus{ outline:none; border-color:var(--blue); }
  .field-item input.err, .field-item select.err{ border-color:var(--red); }
  .remove-row-btn{
    background:none; border:none; color:var(--red); font-size:11.5px; font-weight:700;
    padding:2px 0; cursor:pointer;
  }
  .add-row-btn{
    width:100%; margin-top:4px; padding:10px; border-radius:10px; border:1.5px dashed var(--blue);
    background:#f4f7fa; color:var(--blue-dark); font-size:12.5px; font-weight:700; cursor:pointer;
  }
  .add-row-btn:active{ background:#e9eef3; }
  .evidence-view{
    margin-top:8px; font-size:12.5px; color:#4a5560; background:#f6f8fa; border-radius:10px;
    padding:9px 12px; line-height:1.5;
  }
  .evidence-view + .evidence-view{ margin-top:6px; }
  .evidence-view .ev-title{ font-weight:700; font-size:11px; color:var(--blue-dark); margin-bottom:4px; }
  .evidence-view .ev-row{ display:flex; justify-content:space-between; gap:10px; }
  .evidence-view .ev-row:not(:last-child){ margin-bottom:3px; }
  .evidence-view .ev-k{ color:#8b94a0; }
  .evidence-view .ev-v{ font-weight:600; text-align:right; }

  .indicator-actions{ display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
  .confirm-ind-btn{
    background:var(--green); color:#fff; border:none; border-radius:10px;
    padding:9px 14px; font-size:12.5px; font-weight:700; cursor:pointer;
  }
  .save-progress-btn{
    background:#fff; color:var(--blue-dark); border:1.5px solid var(--blue); border-radius:10px;
    padding:9px 14px; font-size:12.5px; font-weight:700; cursor:pointer;
  }
  .indicator-locked-badge{
    display:flex; align-items:center; gap:10px; margin-top:10px;
    background:#eafaf0; color:#1f7a43; border-radius:10px; padding:9px 12px;
    font-size:12.5px; font-weight:700;
  }
  .edit-ind-btn{
    background:var(--blue-dark); color:#fff; border:none; border-radius:8px;
    padding:5px 12px; font-size:11.5px; font-weight:700; cursor:pointer; margin-left:auto;
  }
  .field-input.locked-input{ background:#f0f2f5; color:#7a8794; }

  .submitbar{
    position:fixed; left:0; right:0; bottom:0; padding:14px 16px 22px;
    background:linear-gradient(to top, var(--bg) 60%, transparent);
  }
  .draft-indicator{
    text-align:center; font-size:11px; font-weight:700; color:var(--green);
    margin-bottom:6px; opacity:0; transition:opacity .3s ease;
  }
  button.submit{
    max-width:448px; margin:0 auto; display:block; width:100%;
    background:var(--navy); color:#fff; border:none; border-radius:14px;
    padding:16px; font-size:15px; font-weight:700; letter-spacing:.3px;
  }
  button.submit:active{background:var(--blue-dark);}
  button.submit:disabled{background:#aab3bd;}
  .toast{
    position:fixed; top:16px; left:50%; transform:translateX(-50%);
    background:var(--navy); color:#fff; padding:12px 18px; border-radius:12px;
    font-size:13px; z-index:50; box-shadow:0 6px 16px rgba(0,0,0,.2); max-width:90%; text-align:center;
    opacity:0; transition:.25s;
  }
  .toast.show{opacity:1;}
  .toast.err{background:var(--red);}
  .toast.okc{background:var(--green);}
  .confirm-overlay{
    position:fixed; inset:0; background:rgba(20,30,45,.5); z-index:60;
    display:flex; align-items:center; justify-content:center; padding:24px;
    opacity:0; transition:opacity .2s ease;
  }
  .confirm-overlay.show{ opacity:1; }
  .confirm-box{
    background:#fff; border-radius:18px; padding:22px 20px; max-width:340px; width:100%;
    box-shadow:0 12px 32px rgba(0,0,0,.25); transform:scale(.95); transition:transform .2s ease;
  }
  .confirm-overlay.show .confirm-box{ transform:scale(1); }
  .confirm-box.review-box{ max-width:380px; max-height:82vh; overflow-y:auto; }
  .confirm-msg{ font-size:15px; font-weight:600; color:var(--navy); text-align:center; margin-bottom:18px; line-height:1.4; }
  .confirm-actions{ display:flex; gap:10px; }
  .confirm-actions button{
    flex:1; padding:13px; border-radius:12px; border:none; font-size:14px; font-weight:700; cursor:pointer;
  }
  .confirm-cancel{ background:#eef1f5; color:var(--navy); }
  .confirm-ok{ background:var(--navy); color:#fff; }
  .confirm-msg.small{ font-size:12.5px; font-weight:600; color:#5b6672; margin-top:14px; margin-bottom:14px; }
  .review-date{ text-align:center; font-size:12px; color:var(--gray); margin-bottom:14px; }
  .review-list{ border-top:1px solid #eef0f3; max-height:52vh; overflow-y:auto; }
  .review-row{
    display:flex; justify-content:space-between; align-items:center; gap:10px;
    padding:9px 0 2px; border-bottom:1px solid #eef0f3; font-size:12.5px; color:var(--navy);
  }
  .review-row.has-evi{ border-bottom:none; padding-bottom:0; }
  .review-badge{ font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; flex:0 0 auto; }
  .review-badge.ok{ background:#e4f6ea; color:var(--green); }
  .review-badge.no{ background:#fdecea; color:var(--red); }
  .review-evi{ padding:2px 0 10px; border-bottom:1px solid #eef0f3; }
  .review-evi .evidence-view{ background:#f7f8fa; margin-top:0; }
  .locked-banner{
    background:#fff3e0; color:#a05a00; font-size:12px; font-weight:600; border-radius:12px;
    padding:10px 14px; margin-bottom:14px; display:flex; align-items:center; gap:8px;
  }
  .badge-static{ font-size:12px; font-weight:700; padding:4px 10px; border-radius:20px; }
  .badge-static.on{ background:#e4f6ea; color:var(--green); }
  .badge-static.off{ background:#fdecea; color:var(--red); }  #dynamic-area{ animation: fadeInArea .18s ease; }
  @keyframes fadeInArea{ from{ opacity:.3; } to{ opacity:1; } }
</style>
</head>
<body>

<div id="app"></div>

<script>
var WEBAPP_URL = "https://script.google.com/macros/s/AKfycbyZjdcOqCzQZ3i54Y2pAZVfbnMfuaEHmPFOaMhlpPqBgD958CWKTN5iujN4lPOkvJ43/exec";
var NAMA = "REZA";
var BATAS_DATANG = "08:15";
var BATAS_PULANG = "16:45";

// manualIndex 0..7 = indikator item 3..10 (labels[2..9])
var EXTRA_FIELDS = {"0": {"repeatable": true, "minRows": 3, "fields": [{"label": "Nama Customer", "type": "text"}, {"label": "No Handphone", "type": "tel"}, {"label": "Keterangan", "type": "text"}]}, "1": {"repeatable": true, "fields": [{"label": "Nama Customer", "type": "text"}, {"label": "Keterangan", "type": "text"}]}, "2": {"repeatable": true, "fields": [{"label": "Nama Customer", "type": "text"}, {"label": "No Handphone", "type": "tel"}, {"label": "Keterangan", "type": "text"}]}, "3": {"repeatable": false, "fields": [{"label": "Jumlah Dokumen MKI", "type": "number"}, {"label": "Jumlah Dokumen CFN", "type": "number"}]}, "4": {"repeatable": false, "fields": [{"label": "Jumlah Invoice MKI", "type": "number"}, {"label": "Jumlah Invoice CFN", "type": "number"}, {"label": "Jumlah Invoice Return", "type": "number"}]}, "5": {"repeatable": false, "fields": [{"label": "Bersama", "type": "select", "options": ["ASPAR", "ZUL", "TAUFIK", "BURHAMIN"]}]}, "6": {"repeatable": true, "fields": [{"label": "Nama Customer", "type": "text"}, {"label": "Keterangan Complaint", "type": "text"}]}, "7": {"repeatable": false, "fields": [{"label": "Waktu Pelaksanaan", "type": "select", "options": ["PAGI", "SORE"]}]}};
var AUTO_LOCKED = [];
var SKIP_EVIDENCE = false;
var SHARED_PEER_IDX = []; // array of manualIndex yang nilainya bisa datang dari peer

var app = document.getElementById("app");
var cfgCache = null;

function todayStr(){
  var d = new Date();
  var tz = new Date(d.getTime() - d.getTimezoneOffset()*60000);
  return tz.toISOString().slice(0,10);
}

function showToast(msg, type){
  var t = document.createElement("div");
  t.className = "toast" + (type ? " " + type : "");
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(function(){ t.classList.add("show"); });
  setTimeout(function(){
    t.classList.remove("show");
    setTimeout(function(){ t.remove(); }, 300);
  }, 2600);
}

function showConfirmDialog(message, onConfirm){
  var overlay = document.createElement("div");
  overlay.className = "confirm-overlay";
  overlay.innerHTML = '<div class="confirm-box">'
    + '<div class="confirm-msg">' + message + '</div>'
    + '<div class="confirm-actions">'
    +   '<button type="button" class="confirm-cancel">Batal</button>'
    +   '<button type="button" class="confirm-ok">Ya, Simpan</button>'
    + '</div></div>';
  document.body.appendChild(overlay);
  requestAnimationFrame(function(){ overlay.classList.add("show"); });
  function close(){
    overlay.classList.remove("show");
    setTimeout(function(){ overlay.remove(); }, 200);
  }
  overlay.querySelector(".confirm-cancel").addEventListener("click", close);
  overlay.addEventListener("click", function(e){ if (e.target === overlay) close(); });
  overlay.querySelector(".confirm-ok").addEventListener("click", function(){
    close();
    onConfirm();
  });
}

function showReviewModal(manualLabels, tanggal, state, onConfirm){
  var tglFmt = tanggal.split("-").reverse().join("/");
  var rows = manualLabels.map(function(lbl, i){
    var v = state.checklist[i];
    var evi = state.evidence[i];
    var row = '<div class="review-row' + (v && evi ? ' has-evi' : '') + '"><span>' + lbl + '</span>'
      + '<span class="review-badge ' + (v ? "ok" : "no") + '">' + (v ? "YA" : "TIDAK") + '</span></div>';
    if (v && evi) {
      row += '<div class="review-evi">' + renderEvidenceView(evi) + '</div>';
    }
    return row;
  }).join("");

  var overlay = document.createElement("div");
  overlay.className = "confirm-overlay";
  overlay.innerHTML = '<div class="confirm-box review-box">'
    + '<div class="confirm-msg">Review Kinerja Hari Ini</div>'
    + '<div class="review-date">' + tglFmt + '</div>'
    + '<div class="review-list">' + rows + '</div>'
    + '<div class="confirm-msg small">Anda yakin untuk menginput kinerja hari ini?</div>'
    + '<div class="confirm-actions">'
    +   '<button type="button" class="confirm-cancel">Kembali</button>'
    +   '<button type="button" class="confirm-ok">Ya, Simpan Kinerja</button>'
    + '</div></div>';
  document.body.appendChild(overlay);
  requestAnimationFrame(function(){ overlay.classList.add("show"); });
  function close(){
    overlay.classList.remove("show");
    setTimeout(function(){ overlay.remove(); }, 200);
  }
  overlay.querySelector(".confirm-cancel").addEventListener("click", close);
  overlay.addEventListener("click", function(e){ if (e.target === overlay) close(); });
  overlay.querySelector(".confirm-ok").addEventListener("click", function(){
    close();
    onConfirm();
  });
}

function formatJamInput(el){
  el.addEventListener("input", function(){
    var v = el.value.replace(/[^0-9]/g, "").slice(0,4);
    if (v.length >= 3) v = v.slice(0,2) + ":" + v.slice(2);
    el.value = v;
  });
}

function formatPercentInput(el){
  el.addEventListener("input", function(){
    var v = el.value.replace(/[^0-9.]/g, "");
    var parts = v.split(".");
    if (parts.length > 2) v = parts[0] + "." + parts.slice(1).join("");
    parts = v.split(".");
    if (parts[1]) parts[1] = parts[1].slice(0,1);
    v = parts.join(".");
    el.value = v;
  });
  el.addEventListener("blur", function(){
    var v = el.value.trim();
    if (v && v !== "" && !/%$/.test(v)) el.value = v + "%";
  });
}
function isValidJam(v){
  return /^([01][0-9]|2[0-3]):[0-5][0-9]$/.test(v);
}

function formatRupiah(raw){
  var digits = String(raw).replace(/[^0-9]/g, "");
  if (!digits) return "";
  digits = digits.replace(/^0+(?=\d)/, "");
  var withSep = digits.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  return "Rp " + withSep;
}

function loadForm(){
  app.innerHTML = '<div style="text-align:center;padding:60px 20px;color:#9aa5b1;font-size:14px;">Memuat data ' + NAMA + '...</div>';
  var today = todayStr();
  var configPromise = fetch(WEBAPP_URL + "?action=config&nama=" + encodeURIComponent(NAMA)).then(function(r){ return r.json(); });
  var dayPromise = fetch(WEBAPP_URL + "?action=dayStatus&nama=" + encodeURIComponent(NAMA) + "&tanggal=" + today).then(function(r){ return r.json(); });

  configPromise.then(function(cfg){
    if (cfg.error){ showToast("Gagal memuat konfigurasi", "err"); return; }
    cfgCache = cfg;
    renderShell(cfg);
    dayPromise.then(function(status){
      DAY_CACHE[today] = status;
      renderDynamic(today, status);
    }).catch(function(){
      showToast("Tidak bisa memuat data tanggal ini", "err");
    });
  }).catch(function(){
    showToast("Tidak bisa terhubung ke server", "err");
  });
}

function renderShell(cfg){
  var displayName = (cfg.fullName && cfg.fullName.trim()) ? cfg.fullName : NAMA;
  var jabatan = cfg.jabatan || "";
  var urlParams = new URLSearchParams(window.location.search);
  window.__bmViewMode = urlParams.get("bm") === "1";

  var html = ''
  + '<div class="topbar">'
  +   '<div class="nama">' + displayName + ' <span id="perf-badge" class="perf-badge" style="display:none"></span></div>'
  +   (jabatan ? '<div class="jabatan">' + jabatan + '</div>' : '')
  +   '<div class="sub">PT. Mitra Kabel Indonesia &mdash; Cabang Makassar' + (window.__bmViewMode ? ' &middot; Mode Tinjau (baca saja)' : '') + '</div>'
  + '</div>'
  + '<div class="wrap">'
  +   '<div class="card">'
  +     '<h3>Tanggal</h3>'
  +     '<label>Pilih tanggal</label>'
  +     '<input type="date" id="f-tanggal" value="' + todayStr() + '" max="' + todayStr() + '">'
  +   '</div>'
  +   '<div id="dynamic-area"></div>'
  + '</div>'
  + '<div class="submitbar"><div id="draft-indicator" class="draft-indicator">Tersimpan otomatis ✓</div><button class="submit" id="btn-submit">Simpan Kinerja Hari Ini</button></div>';

  app.innerHTML = html;
  loadPerformanceBadge();
  document.getElementById("f-tanggal").addEventListener("change", function(){
    loadDay(this.value);
  });
}

var DAY_CACHE = {};

function getPerformanceLabel(percent){
  if (percent >= 90) return { text: "SANGAT BAIK", cls: "sb" };
  if (percent >= 75) return { text: "BAIK", cls: "b" };
  return { text: "CUKUP", cls: "c" };
}

function loadPerformanceBadge(){
  var now = new Date();
  var ym = now.getFullYear() + "-" + ("0"+(now.getMonth()+1)).slice(-2);
  fetch(WEBAPP_URL + "?action=monthDetail&nama=" + encodeURIComponent(NAMA) + "&month=" + ym)
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d.error) return;
      var badge = document.getElementById("perf-badge");
      if (!badge) return;
      var lbl = getPerformanceLabel(d.monthPercent);
      badge.textContent = lbl.text;
      badge.className = "perf-badge " + lbl.cls;
      badge.style.display = "inline-block";
    })
    .catch(function(){});
}

function loadDay(tanggal, force){
  var area = document.getElementById("dynamic-area");
  if (!force && DAY_CACHE[tanggal]) {
    renderDynamic(tanggal, DAY_CACHE[tanggal]);
    fetchDay(tanggal, true);
    return;
  }
  area.innerHTML = '<div style="text-align:center;padding:30px 0;color:#9aa5b1;font-size:13px;">Memuat...</div>';
  fetchDay(tanggal, false);
}

function fetchDay(tanggal, silent){
  fetch(WEBAPP_URL + "?action=dayStatus&nama=" + encodeURIComponent(NAMA) + "&tanggal=" + tanggal)
    .then(function(r){ return r.json(); })
    .then(function(status){
      DAY_CACHE[tanggal] = status;
      var currentSelected = document.getElementById("f-tanggal");
      if (currentSelected && currentSelected.value !== tanggal) return; // tanggal sudah diganti lagi, abaikan hasil basi
      renderDynamic(tanggal, status);
    })
    .catch(function(){
      if (!silent) showToast("Tidak bisa memuat data tanggal ini", "err");
    });
}

function parseEvidence(raw){
  if (!raw) return null;
  try {
    var obj = JSON.parse(raw);
    if (obj && typeof obj === "object") return obj;
  } catch(e){}
  return raw; // plain text
}

function renderEvidenceView(raw){
  var parsed = parseEvidence(raw);
  if (!parsed) return '';
  if (typeof parsed === "string") {
    return '<div class="evidence-view">' + parsed + '</div>';
  }
  function rowsHtml(obj){
    return Object.keys(obj).map(function(k){
      return '<div class="ev-row"><span class="ev-k">' + k + '</span><span class="ev-v">' + (obj[k] || '-') + '</span></div>';
    }).join("");
  }
  if (Array.isArray(parsed)) {
    return parsed.map(function(rowObj, idx){
      return '<div class="evidence-view"><div class="ev-title">Baris ' + (idx+1) + '</div>' + rowsHtml(rowObj) + '</div>';
    }).join("");
  }
  return '<div class="evidence-view">' + rowsHtml(parsed) + '</div>';
}

function fieldInputHtml(manualIdx, rowIdx, fi, f, isDynamicEksp){
  var id = "f-" + manualIdx + "-" + rowIdx + "-" + fi;
  var inner;
  var optAttr = f.optional ? ' data-optional="1"' : '';
  var reqMark = f.optional ? '<span class="opt">(opsional)</span>' : '<span class="req">*</span>';
  if (f.type === "select") {
    var opts = ['<option value="">Pilih...</option>'].concat(f.options.map(function(o){ return '<option value="' + o + '">' + o + '</option>'; }));
    inner = '<select class="field-input" id="' + id + '" data-key="' + f.label + '"' + optAttr + ' data-type="select">' + opts.join("") + '</select>';
  } else if (f.type === "rupiah") {
    inner = '<input type="text" class="field-input" id="' + id + '" data-key="' + f.label + '"' + optAttr + ' data-type="rupiah" inputmode="numeric" placeholder="Rp 0">';
  } else if (f.type === "tel") {
    inner = '<input type="text" class="field-input" id="' + id + '" data-key="' + f.label + '"' + optAttr + ' data-type="tel" inputmode="tel" placeholder="08xx-xxxx-xxxx">';
  } else if (f.type === "number") {
    var extraClass = (isDynamicEksp && f.label === "Jumlah Ekspedisi Didatangi") ? " ekspedisi-count-input" : "";
    inner = '<input type="text" class="field-input' + extraClass + '" id="' + id + '" data-key="' + f.label + '"' + optAttr + ' data-type="number" inputmode="numeric" placeholder="0">';
  } else if (f.type === "jam") {
    inner = '<input type="text" class="field-input jam-field" id="' + id + '" data-key="' + f.label + '"' + optAttr + ' data-type="jam" inputmode="numeric" maxlength="5" placeholder="08:00">';
  } else if (f.type === "percent1") {
    inner = '<input type="text" class="field-input" id="' + id + '" data-key="' + f.label + '"' + optAttr + ' data-type="percent1" inputmode="decimal" placeholder="92.2%">';
  } else {
    inner = '<input type="text" class="field-input" id="' + id + '" data-key="' + f.label + '"' + optAttr + ' data-type="text" placeholder="' + f.label + '">';
  }
  return '<div class="field-item"><div class="field-label">' + reqMark + ' ' + f.label + '</div>' + inner + '</div>';
}

function buildRowHtml(manualIdx, rowIdx, defs, removable, isDynamicEksp){
  var fieldsHtml = defs.map(function(f, fi){ return fieldInputHtml(manualIdx, rowIdx, fi, f, isDynamicEksp); }).join("");
  var dynamicContainer = isDynamicEksp ? '<div class="ekspedisi-names"></div>' : '';
  var removeBtn = removable ? '<button type="button" class="remove-row-btn">Hapus baris ini</button>' : '';
  return '<div class="row-card" data-row="' + rowIdx + '">' + fieldsHtml + dynamicContainer + removeBtn + '</div>';
}

function buildFieldsHtml(manualIdx){
  var group = EXTRA_FIELDS[manualIdx];
  if (!group) {
    return '<div class="rows-container" id="rows-' + manualIdx + '" data-repeatable="0">'
      + '<div class="row-card" data-row="0">'

      + '<input type="text" class="field-input" data-key="Keterangan" maxlength="300" placeholder="Tulis keterangan singkat...">'
      + '</div></div></div>';
  }
  var rowHtml = buildRowHtml(manualIdx, 0, group.fields, false, !!group.dynamicEkspedisi);
  var addBtn = group.repeatable ? '<button type="button" class="add-row-btn" data-idx="' + manualIdx + '">+ Tambah Baris' + (group.dynamicEkspedisi ? ' (Ritase Berikutnya)' : '') + '</button>' : '';

function wireEkspedisiCount(scopeEl){
  scopeEl.querySelectorAll('.ekspedisi-count-input').forEach(function(countInp){
    if (countInp.__wiredEksp) return;
    countInp.__wiredEksp = true;
    var rowCard = countInp.closest('.row-card');
    var container = rowCard ? rowCard.querySelector('.ekspedisi-names') : null;
    if (!container) return;
    function regenerate(){
      var n = parseInt(countInp.value, 10);
      if (!n || n < 1) n = 0;
      if (n > 15) n = 15;
      var oldVals = Array.from(container.querySelectorAll('.field-input')).map(function(i){ return i.value; });
      var html = '';
      for (var k=0;k<n;k++){
        html += '<div class="field-item"><div class="field-label"><span class="req">*</span> Nama Ekspedisi ' + (k+1) + '</div>'
          + '<input type="text" class="field-input" data-key="Nama Ekspedisi ' + (k+1) + '" data-type="text" placeholder="Nama Ekspedisi ' + (k+1) + '"></div>';
      }
      container.innerHTML = html;
      var newInputs = container.querySelectorAll('.field-input');
      newInputs.forEach(function(inp, idx){ if (oldVals[idx]) inp.value = oldVals[idx]; });
    }
    countInp.addEventListener('input', regenerate);
    regenerate();
  });
}

function wireRowInputs(rowEl){
  rowEl.querySelectorAll('.field-input[data-type="rupiah"]').forEach(function(inp){
    inp.addEventListener('input', function(){ inp.value = formatRupiah(inp.value); });
  });
  rowEl.querySelectorAll('.field-input[data-type="jam"]').forEach(function(inp){
    formatJamInput(inp);
  });
  rowEl.querySelectorAll('.field-input[data-type="percent1"]').forEach(function(inp){
    formatPercentInput(inp);
  });
  wireEkspedisiCount(rowEl);
  var removeBtn = rowEl.querySelector('.remove-row-btn');
  if (removeBtn) removeBtn.addEventListener('click', function(){ rowEl.remove(); });
}

function addRow(manualIdx){
  var group = EXTRA_FIELDS[manualIdx];
  var container = document.getElementById('rows-' + manualIdx);
  var rowIdx = container.querySelectorAll('.row-card').length;
  var wrapper = document.createElement('div');
  wrapper.innerHTML = buildRowHtml(manualIdx, rowIdx, group.fields, true, !!group.dynamicEkspedisi);
  var rowEl = wrapper.firstChild;
  container.appendChild(rowEl);
  wireRowInputs(rowEl);
  var firstInput = rowEl.querySelector('.field-input');
  if (firstInput) firstInput.focus();
}

function wireFieldsValidation(manualIdx, chk, wrap){
  var group = EXTRA_FIELDS[manualIdx];
  if (group && group.repeatable) {
    // validasi baris berulang cuma dicek saat submit, bukan per-blur
    wrap.querySelectorAll('.field-input[data-type="rupiah"]').forEach(function(inp){
      inp.addEventListener('input', function(){ inp.value = formatRupiah(inp.value); });
    });
    wrap.querySelectorAll('.field-input[data-type="jam"]').forEach(function(inp){
      formatJamInput(inp);
    });
    wireEkspedisiCount(wrap);
    return;
  }
  var inputs = wrap.querySelectorAll(".field-input");
  inputs.forEach(function(inp){
    if (inp.getAttribute("data-type") === "rupiah") {
      inp.addEventListener("input", function(){ inp.value = formatRupiah(inp.value); });
    }
    if (inp.getAttribute("data-type") === "jam") {
      formatJamInput(inp);
    }
    if (inp.getAttribute("data-type") === "percent1") {
      formatPercentInput(inp);
    }
    inp.addEventListener("blur", checkFieldsComplete);
    inp.addEventListener("change", checkFieldsComplete);
  });
  function checkFieldsComplete(){
    setTimeout(function(){
      var stillEmpty = false;
      inputs.forEach(function(inp2){
        inp2.classList.remove('err');
        if (!inp2.value || !inp2.value.trim()){ stillEmpty = true; inp2.classList.add('err'); }
      });
      if (stillEmpty && chk.checked && !wrap.contains(document.activeElement)) {
        chk.checked = false;
        wrap.classList.remove('show');
        showToast('Lengkapi dulu isian sebelum mencentang "Ya"', 'err');
      }
    }, 150);
  }
}

function collectFieldsValue(manualIdx){
  var group = EXTRA_FIELDS[manualIdx];
  var container = document.getElementById('rows-' + manualIdx);
  if (!group) {
    var inp = container.querySelector('.field-input');
    var v0 = inp ? inp.value.trim() : "";
    return { ok: true, json: v0, count: v0 ? 1 : 0 };
  }
  if (group.repeatable) {
    var rows = Array.from(container.querySelectorAll('.row-card'));
    var results = [];
    var anyIncomplete = false;
    rows.forEach(function(rowEl){
      var inputs = rowEl.querySelectorAll('.field-input');
      var vals = {}; var filledCount = 0; var total = inputs.length;
      inputs.forEach(function(inp){
        var v = inp.value.trim();
        inp.classList.remove('err');
        if (v) filledCount++;
        vals[inp.getAttribute('data-key')] = v;
      });
      if (filledCount === 0) return; // baris kosong, dilewati
      if (filledCount < total) {
        anyIncomplete = true;
        inputs.forEach(function(inp){ if (!inp.value.trim()) inp.classList.add('err'); });
        return;
      }
      results.push(vals);
    });
    if (anyIncomplete) return { ok:false, json:"", count:0 };
    return { ok:true, json: results.length ? JSON.stringify(results) : "", count: results.length };
  }
  var inputs2 = container.querySelectorAll('.field-input');
  var obj = {}; var complete = true; var any = false;
  inputs2.forEach(function(inp){
    var v = inp.value.trim();
    var isOptional = inp.getAttribute('data-optional') === '1';
    if (v) any = true;
    if (!v && !isOptional) complete = false;
    obj[inp.getAttribute('data-key')] = v;
  });
  var condDef = group && group.conditionalRequire;
  if (condDef) {
    var whenVal = (obj[condDef.when] || '').trim();
    var triggered = condDef.operator === 'neq0' ? (whenVal !== '' && whenVal !== '0') : false;
    if (triggered && !(obj[condDef.field] || '').trim()) complete = false;
  }
  if (!any) return { ok:true, json:"", count:0 };
  if (!complete) return { ok:false, json:"", count:0 };
  return { ok:true, json: JSON.stringify(obj), count:1 };
}

  function collectManualState(mutateOnIncomplete){
    var checklist = [];
    var evidence = [];
    var hasIncomplete = false;
    var belowMinRowsLabels = [];

    manualLabels.forEach(function(lbl, i){
      if (AUTO_LOCKED.indexOf(i) !== -1) {

      var alreadyShared = SHARED_PEER_IDX.indexOf(i) !== -1 && status.values[i+2] === true;

        var groupDef = EXTRA_FIELDS[i];

        if (result.count === 0) {
          checklist.push(false);
          evidence.push("");
        } else if (result.count < minRows) {
          checklist.push(false);
          evidence.push(result.json);
          belowMinRowsLabels.push(lbl + ' (' + result.count + '/' + minRows + ')');
        } else {
          checklist.push(true);
          evidence.push(result.json);
        }
      } else {
        checklist.push(false);
        evidence.push("");
      }
    });

    return { checklist: checklist, evidence: evidence, hasIncomplete: hasIncomplete, belowMinRowsLabels: belowMinRowsLabels };
  }

  var draftTimer = null;
  var draftIndicatorTimer = null;
  var suppressDraftSave = false;

  function showDraftIndicator(){
    var el = document.getElementById('draft-indicator');
    if (!el) return;
    el.style.opacity = '1';
    clearTimeout(draftIndicatorTimer);
    draftIndicatorTimer = setTimeout(function(){ el.style.opacity = '0'; }, 1800);
  }

  function doDraftSave(){
    if (suppressDraftSave) return;
    var tanggal2 = document.getElementById("f-tanggal").value;
    if (!tanggal2) return;
    var jamD = isValidJam(elDatang.value) ? elDatang.value : "";
    var jamP = isValidJam(elPulang.value) ? elPulang.value : "";
    var state = collectManualState(false);
    fetch(WEBAPP_URL, {
      method: "POST",
      headers: {"Content-Type": "text/plain;charset=utf-8"},
      body: JSON.stringify({
        nama: NAMA, tanggal: tanggal2, jamDatang: jamD, jamPulang: jamP,
        checklist: state.checklist, evidence: state.evidence, draft: true
      })
    })
      .then(function(r){ return r.json(); })
      .then(function(res){ if (res.ok) showDraftIndicator(); })
      .catch(function(){});
  }

  function scheduleDraftSave(){
    clearTimeout(draftTimer);
    draftTimer = setTimeout(doDraftSave, 900);
  }

  area.addEventListener('input', scheduleDraftSave);
  area.addEventListener('change', scheduleDraftSave);

  btn.onclick = function(){
    var tanggal2 = document.getElementById("f-tanggal").value;
    if (!tanggal2){ showToast("Pilih tanggal dulu", "err"); return; }
    if (!elDatang.value){ showToast("Jam Datang wajib diisi sebelum menyimpan", "err"); elDatang.focus(); return; }
    if (!elPulang.value){ showToast("Jam Pulang wajib diisi sebelum menyimpan", "err"); elPulang.focus(); return; }
    if (!isValidJam(elDatang.value)){ showToast("Format Jam Datang salah, contoh: 08:15", "err"); return; }
    if (!isValidJam(elPulang.value)){ showToast("Format Jam Pulang salah, contoh: 16:45", "err"); return; }

    var state = collectManualState(true);
    if (state.hasIncomplete) {
      showToast('Ada isian bukti capaian yang belum lengkap, silakan periksa kembali', 'err');
      return;
    }
    var checklist = state.checklist;
    var evidence = state.evidence;
    var belowMinRowsLabels = state.belowMinRowsLabels;

    showReviewModal(manualLabels, tanggal2, state, function(){
      clearTimeout(draftTimer);
      suppressDraftSave = true;

      btn.disabled = true;
      btn.textContent = "Menyimpan...";

      fetch(WEBAPP_URL, {
        method: "POST",
        headers: {"Content-Type": "text/plain;charset=utf-8"},
        body: JSON.stringify({
          nama: NAMA,
          tanggal: tanggal2,
          jamDatang: elDatang.value || "",
          jamPulang: elPulang.value || "",
          checklist: checklist,
          evidence: evidence
        })
      })
      .then(function(r){ return r.json(); })
      .then(function(res){
        if (res.ok){
          if (belowMinRowsLabels.length){
            showToast("Tersimpan, tapi belum capai target: " + belowMinRowsLabels.join(", "), "err");
          } else {
            showToast("Tersimpan ke Google Sheet ✓", "okc");
          }
          loadDay(tanggal2, true);
        } else {
          suppressDraftSave = false;
          btn.disabled = false;
          btn.textContent = "Simpan Kinerja Hari Ini";
          showToast(res.error || "Gagal menyimpan", "err");
        }
      })
      .catch(function(){
        suppressDraftSave = false;
        btn.disabled = false;
        btn.textContent = "Simpan Kinerja Hari Ini";
        showToast("Tidak bisa terhubung ke server", "err");
      });
    });
  };
}

loadForm();
</script>
