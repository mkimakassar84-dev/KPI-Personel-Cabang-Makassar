<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rekap Kinerja Tim - Cabang Makassar</title>
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
<link rel="preconnect" href="https://script.google.com" crossorigin>
<link rel="preconnect" href="https://script.googleusercontent.com" crossorigin>
<link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
<link rel="dns-prefetch" href="https://script.google.com">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" defer></script>
<style>
  :root{
    --navy:#1c2733;
    --card:#ffffff;
    --bg:#eef1f5;
    --blue:#5b7fa6;
    --blue-dark:#3b5a7d;
    --green:#3fae63;
    --amber:#e0a53f;
    --red:#e05a4e;
    --gray:#9aa5b1;
    --border:#e6e9ee;
    --radius:16px;
  }
  *{box-sizing:border-box;}
  html, body{ overflow-x:hidden; max-width:100%; }
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--navy);
  }
  .topbar{
    background:var(--navy); color:#fff; padding:22px 24px 60px;
  }
  .topbar h1{ margin:0 0 4px; font-size:20px; font-weight:800; }
  .topbar .sub{ font-size:13px; opacity:.7; }

  .wrap{ max-width:1080px; margin:-38px auto 0; padding:0 20px 60px; }

  .filterbar{
    background:#fff; border-radius:var(--radius); padding:16px 18px;
    box-shadow:0 6px 18px rgba(20,30,45,.08); margin-bottom:18px;
    display:flex; flex-wrap:wrap; gap:14px; align-items:flex-end;
  }
  .filterbar .field{ display:flex; flex-direction:column; gap:6px; }
  .filterbar label{ font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:#7a8794; font-weight:700; }
  .filterbar select, .filterbar input[type=month]{
    padding:10px 12px; border-radius:10px; border:1.5px solid var(--border);
    font-size:14px; background:#fbfcfd; color:var(--navy); font-weight:600; min-width:170px;
  }
  .filterbar select:focus, .filterbar input:focus{ outline:none; border-color:var(--blue); }
  .refresh-btn{
    margin-left:auto; background:var(--navy); color:#fff; border:none; border-radius:10px;
    padding:10px 16px; font-size:13px; font-weight:700; cursor:pointer;
  }
  .refresh-btn:active{ background:var(--blue-dark); }
  .wa-share-btn-dash{
    width:100%; margin-top:10px; padding:12px; border-radius:12px; border:none;
    background:#25D366; color:#fff; font-weight:700; font-size:13px; cursor:pointer;
  }
  .wa-share-btn-dash:active{ background:#1ea952; }
  .wa-share-btn-dash:disabled{ background:#a9d9bd; cursor:default; }
  .toast{
    position:fixed; top:16px; left:50%; transform:translateX(-50%);
    background:var(--navy); color:#fff; padding:12px 18px; border-radius:12px;
    font-size:13px; z-index:70; box-shadow:0 6px 16px rgba(0,0,0,.2); max-width:90%; text-align:center;
    opacity:0; transition:.25s;
  }
  .toast.show{ opacity:1; }
  .toast.err{ background:var(--red); }
  .toast.okc{ background:var(--green); }
  .perf-banner{
    text-align:center; font-size:12.5px; color:var(--navy); background:#fff;
    border-radius:14px; padding:10px 16px; margin-bottom:14px; box-shadow:0 4px 14px rgba(20,30,45,.06);
  }
  .perf-banner strong{ letter-spacing:.3px; }
  .perf-banner.sb strong{ color:var(--green); }
  .perf-banner.b strong{ color:var(--blue); }
  .perf-banner.c strong{ color:#a97417; }
  .last-update{ font-size:11px; color:var(--gray); margin-top:6px; }

  .cards{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-bottom:18px; }
  .kpi{
    background:#fff; border-radius:var(--radius); padding:16px 18px;
    box-shadow:0 6px 18px rgba(20,30,45,.08);
  }
  .kpi .lbl{ font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:#7a8794; font-weight:700; margin-bottom:8px; }
  .kpi .val{ font-size:28px; font-weight:800; }
  .kpi .val.small{ font-size:18px; }
  .kpi .val.tiny{ font-size:13px; line-height:1.35; font-weight:700; word-break:break-word; }
  .kpi .delta{ font-size:12px; font-weight:700; margin-top:4px; }
  .kpi .delta.up{ color:var(--green); }
  .kpi .delta.down{ color:var(--red); }
  .kpi .delta.flat{ color:var(--gray); }

  .panel{
    background:#fff; border-radius:var(--radius); padding:18px 20px 20px;
    box-shadow:0 6px 18px rgba(20,30,45,.08); margin-bottom:18px;
  }
  .panel h3{ margin:0 0 4px; font-size:14px; font-weight:800; }
  .panel .panel-sub{ font-size:12px; color:#7a8794; margin:0 0 14px; }
  .chart-wrap{ position:relative; height:260px; }
  .chart-wrap.tall{ height:320px; }

  .two-col{ display:grid; grid-template-columns:1.2fr 1fr; gap:18px; }
  @media (max-width:800px){ .two-col{ grid-template-columns:1fr; } }

  table{ width:100%; border-collapse:collapse; font-size:13px; }
  th{ text-align:left; padding:8px 10px; font-size:11px; text-transform:uppercase; letter-spacing:.4px; color:#7a8794; border-bottom:1.5px solid var(--border); }
  td{ padding:9px 10px; border-bottom:1px solid #f2f4f7; }
  tr.clickable{ cursor:pointer; }
  tr.clickable:hover{ background:#f8fafc; }

  .barcell{ display:flex; align-items:center; gap:8px; }
  .barcell .track{ flex:1; height:8px; background:#eef1f5; border-radius:6px; overflow:hidden; }
  .barcell .fill{ height:100%; border-radius:6px; background:var(--blue); }
  .barcell .fill.low{ background:var(--red); }
  .barcell .fill.mid{ background:var(--amber); }
  .barcell .pct{ font-weight:700; font-size:12px; min-width:34px; text-align:right; }

  .dot-row{ display:flex; gap:3px; flex-wrap:wrap; }
  .dot{ width:9px; height:9px; border-radius:50%; background:#e2e6eb; }
  .dot.on{ background:var(--green); }
  .dot.off{ background:var(--red); }
  .dot.na{ background:#eef1f5; }

  .weekday-sun td{ background:#fbfbfb; color:#b7bec6; }

  .daybadge{ font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px; }
  .daybadge.ok{ background:#e4f6ea; color:var(--green); }
  .daybadge.mid{ background:#fdf3e2; color:#a97417; }
  .daybadge.low{ background:#fdecea; color:var(--red); }
  .daybadge.na{ background:#f2f4f7; color:var(--gray); }

  .modal-backdrop{
    position:fixed; inset:0; background:rgba(20,30,45,.45); display:none;
    align-items:center; justify-content:center; z-index:100; padding:20px;
  }
  .modal-backdrop.show{ display:flex; }
  .modal{
    background:#fff; border-radius:18px; max-width:420px; width:100%; max-height:80vh;
    overflow-y:auto; padding:20px;
  }
  .modal h4{ margin:0 0 2px; font-size:16px; }
  .modal .modal-sub{ font-size:12px; color:#7a8794; margin:0 0 14px; }
  .modal .mitem-block{ padding:9px 0; border-bottom:1px solid #f2f4f7; }
  .modal .mitem-block:last-child{ border-bottom:none; }
  .modal .mitem{ display:flex; justify-content:space-between; align-items:center; font-size:13px; }
  .modal .mitem-block.clickable{ cursor:pointer; }
  .modal .mitem-block.clickable .mitem span:first-child{ display:flex; align-items:center; gap:6px; }
  .modal .chev{ font-size:10px; color:var(--blue); transition:transform .15s; flex:0 0 auto; }
  .modal .mitem-block.expanded .chev{ transform:rotate(90deg); }
  .modal .mitem-evi{ margin-top:6px; font-size:12px; color:#5b6672; background:#f6f8fa; border-radius:8px; padding:8px 10px; line-height:1.4; display:none; }
  .modal .mitem-block.expanded .mitem-evi{ display:block; }
  .modal .mitem-evi .ev-title{ font-weight:700; font-size:10.5px; color:var(--blue-dark); margin-bottom:3px; }
  .modal .mitem-evi .ev-title:not(:first-child){ margin-top:8px; }
  .modal .mitem-evi .ev-row{ display:flex; justify-content:space-between; gap:8px; }
  .modal .mitem-evi .ev-row:not(:last-child){ margin-bottom:2px; }
  .modal .mitem-evi .ev-k{ color:#8b94a0; }
  .modal .mitem-evi .ev-v{ font-weight:600; text-align:right; }
  .modal-close{ margin-top:14px; width:100%; padding:12px; border:none; border-radius:10px; background:var(--navy); color:#fff; font-weight:700; font-size:13px; }

  .empty-hint{
    font-size:12px; color:var(--gray); background:#f6f8fa; border-radius:10px; padding:10px 14px; margin-bottom:14px;
  }

  .legend-row{ display:flex; gap:14px; font-size:11px; color:#7a8794; margin-top:8px; flex-wrap:wrap; }
  .legend-row span{ display:inline-flex; align-items:center; gap:5px; }
  .legend-row .dot{ display:inline-block; }

  .table-scroll{ overflow-x:auto; -webkit-overflow-scrolling:touch; margin:0 -4px; padding:0 4px; }
  .table-scroll table{ min-width:480px; }

  .auto-refresh-note{ font-size:11px; color:var(--gray); display:flex; align-items:center; gap:6px; }
  .bm-note-panel{ border-left:4px solid var(--blue); }
  .bm-note-textarea{
    width:100%; min-height:90px; border:1.5px solid var(--border); border-radius:10px;
    padding:12px 14px; font-size:13.5px; font-family:inherit; color:var(--navy);
    resize:vertical; box-sizing:border-box; background:#fbfcfd;
  }
  .bm-note-textarea:focus{ outline:none; border-color:var(--blue); }
  .bm-note-actions{ display:flex; align-items:center; gap:12px; margin-top:10px; }
  .bm-note-save{
    border:none; border-radius:10px; background:var(--blue-dark); color:#fff;
    font-weight:700; font-size:13px; padding:10px 18px; cursor:pointer;
  }
  .bm-note-save:disabled{ opacity:.6; cursor:default; }
  .bm-note-status{ font-size:11.5px; color:var(--gray); }

  /* ===== Mobile ===== */
  @media (max-width:640px){
    .topbar{ padding:18px 16px 46px; }
    .topbar h1{ font-size:17px; }
    .topbar .sub{ font-size:12px; }
    .wrap{ margin-top:-28px; padding:0 12px 50px; }

    .filterbar{ flex-direction:column; align-items:stretch; padding:14px; gap:10px; }
    .filterbar .field{ width:100%; }
    .filterbar select, .filterbar input[type=month]{
      width:100%; min-width:0; min-height:46px; font-size:15px;
    }
    .refresh-btn{ margin-left:0; width:100%; min-height:46px; font-size:14px; }

    .cards{ grid-template-columns:1fr 1fr; gap:10px; }
    .kpi{ padding:13px 14px; border-radius:14px; }
    .kpi .val{ font-size:22px; }
    .kpi .val.small{ font-size:14px; line-height:1.3; }
    .kpi .val.tiny{ font-size:11.5px; line-height:1.3; }
    .kpi .lbl{ font-size:10px; }

    .panel{ padding:15px 14px 16px; border-radius:14px; }
    .panel h3{ font-size:13px; }
    .chart-wrap{ height:220px; }
    .chart-wrap.tall{ height:280px; }

    table{ font-size:12px; }
    th{ padding:7px 8px; font-size:10px; }
    td{ padding:12px 8px; }
    tr.clickable{ min-height:44px; }

    .dot{ width:10px; height:10px; }

    .modal{ max-width:94vw; padding:16px; border-radius:16px; }
    .modal h4{ font-size:15px; }

    .last-update{ font-size:10px; }
  }

  @media (max-width:360px){
    .cards{ grid-template-columns:1fr; }
    .kpi .val{ font-size:20px; }
    .topbar h1{ font-size:16px; }
  }
</style>

<body>

<div class="topbar">
  <h1>Rekap Kinerja Tim</h1>
  <div class="sub">PT. Mitra Kabel Indonesia &mdash; Cabang Makassar</div>
</div>

<div class="wrap">
  <div class="filterbar">
    <div class="field">
      <label>Personel</label>
      <select id="f-nama"></select>
    </div>
    <div class="field">
      <label>Bulan</label>
      <input type="month" id="f-bulan">
    </div>
    <button class="refresh-btn" id="btn-refresh">Muat Ulang</button>
  </div>
  <div class="last-update" id="last-update"></div>
  <div class="auto-refresh-note">Data diperbarui saat halaman dibuka atau tombol "Muat Ulang" ditekan</div>
  <button class="wa-share-btn-dash" id="btn-wa-share-dash">📤 Bagikan Halaman Ini ke WhatsApp</button>

  <div id="content"></div>
</div>

<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" id="modal-body"></div>
</div>

<script>
var WEBAPP_URL = "https://script.google.com/macros/s/AKfycbyZjdcOqCzQZ3i54Y2pAZVfbnMfuaEHmPFOaMhlpPqBgD958CWKTN5iujN4lPOkvJ43/exec";
var PERSON_LIST = ["ASTRID","ADI","REZA","BURHAMIN","ZUL","ASPAR","TAUFIK","PUTRI"];
var WEEKDAY_NAMES = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
var WEEKDAY_SHORT = ["Min","Sen","Sel","Rab","Kam","Jum","Sab"];

var trendChart = null, indicatorChart = null, teamChart = null;
var isModalOpen = false;

function currentYearMonth(){
  var d = new Date();
  return d.getFullYear() + "-" + ("0"+(d.getMonth()+1)).slice(-2);
}
function monthLabel(ym){
  var p = ym.split("-");
  var names = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
  return names[parseInt(p[1],10)-1] + " " + p[0];
}
function escapeHtmlDash(s){
  return String(s == null ? "" : s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function formatJamDetail(decimalHours){
  var totalMinutes = Math.round((decimalHours || 0) * 60);
  var jam = Math.floor(totalMinutes / 60);
  var menit = totalMinutes % 60;
  return jam + " jam " + menit + " menit";
}
function pctClass(p){ return p>=80 ? "" : (p>=50 ? "mid" : "low"); }
function badgeClass(p){ if (p===null) return "na"; return p>=80 ? "ok" : (p>=50 ? "mid" : "low"); }

function initFilters(){
  var sel = document.getElementById("f-nama");
  var urlParams = new URLSearchParams(window.location.search);
  var lockedNama = urlParams.get("nama");
  var isLocked = urlParams.get("lock") === "1" && lockedNama && PERSON_LIST.indexOf(lockedNama) !== -1;

  if (isLocked) {
    var o = document.createElement("option");
    o.value = lockedNama; o.textContent = lockedNama;
    sel.appendChild(o);
    sel.value = lockedNama;
    var field = sel.closest(".field");
    if (field) field.style.display = "none";
    var title = document.querySelector(".topbar h1");
    if (title) title.textContent = "Kinerja Saya - " + lockedNama;
    var waBtn = document.getElementById("btn-wa-share-dash");
    if (waBtn) waBtn.style.display = "none";
  } else {
    var optOverview = document.createElement("option");
    optOverview.value = "__OVERVIEW__";
    optOverview.textContent = "Semua Tim (Perbandingan)";
    sel.appendChild(optOverview);
    PERSON_LIST.forEach(function(n){
      var opt = document.createElement("option");
      opt.value = n; opt.textContent = n;
      sel.appendChild(opt);
    });
    var optMakassar = document.createElement("option");
    optMakassar.value = "MAKASSAR";
    optMakassar.textContent = "MAKASSAR (Rekap Cabang)";
    sel.appendChild(optMakassar);
    sel.value = "__OVERVIEW__";
  }

  document.getElementById("f-bulan").value = currentYearMonth();

  sel.addEventListener("change", function(){ load(); });
  document.getElementById("f-bulan").addEventListener("change", function(){ load(); if (!isLocked) setTimeout(prefetchAllPersons, 500); });
  document.getElementById("btn-refresh").addEventListener("click", function(){ load(true); });
}

function setLastUpdate(){
  var now = new Date();
  document.getElementById("last-update").textContent = "Terakhir dimuat: " + now.toLocaleString("id-ID");
}

var LS_CACHE_KEY = "kpiRekapCacheV1";
var VIEW_CACHE = {};
try {
  var _ls = localStorage.getItem(LS_CACHE_KEY);
  if (_ls) VIEW_CACHE = JSON.parse(_ls) || {};
} catch(e) { VIEW_CACHE = {}; }
var reqToken = 0;
var _lsSaveTimer = null;
function persistViewCache(){
  clearTimeout(_lsSaveTimer);
  _lsSaveTimer = setTimeout(function(){
    try { localStorage.setItem(LS_CACHE_KEY, JSON.stringify(VIEW_CACHE)); } catch(e){}
  }, 250);
}

function cacheKey(nama, bulan){
  return nama === "__OVERVIEW__" ? ("ov|" + bulan) : ("p|" + nama + "|" + bulan);
}

function load(force){
  reqToken++;
  var myToken = reqToken;
  var nama = document.getElementById("f-nama").value;
  var bulan = document.getElementById("f-bulan").value || currentYearMonth();
  var key = cacheKey(nama, bulan);

  if (!force && VIEW_CACHE[key]) {
    renderFromData(nama, bulan, VIEW_CACHE[key]);
    fetchData(nama, bulan, key, true, myToken);
    return;
  }

  var content = document.getElementById("content");
  content.innerHTML = '<div class="panel" style="text-align:center;color:#9aa5b1;padding:50px 0;">Memuat data...</div>';
  fetchData(nama, bulan, key, false, myToken);
}

function renderFromData(nama, bulan, data){
  if (nama === "__OVERVIEW__") {
    renderOverview(data, bulan);
  } else {
    renderPerson(nama, bulan, data.detail, data.trend);
  }
  setLastUpdate();
}

function fetchData(nama, bulan, key, silent, myToken){
  var url = nama === "__OVERVIEW__"
    ? (WEBAPP_URL + "?action=teamOverview&month=" + bulan)
    : (WEBAPP_URL + "?action=personView&nama=" + encodeURIComponent(nama) + "&month=" + bulan);
  fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(data){
      VIEW_CACHE[key] = data;
      persistViewCache();
      if (myToken !== reqToken) return; // filter sudah diganti lagi sebelum ini selesai, abaikan
      renderFromData(nama, bulan, data);
    })
    .catch(function(){
      if (myToken !== reqToken) return;
      if (!silent) document.getElementById("content").innerHTML = '<div class="panel">Tidak bisa memuat data. Cek koneksi.</div>';
    });
}

function selectPerson(nama){
  document.getElementById("f-nama").value = nama;
  load();
}

function renderOverview(list, bulan){
  var sorted = list.slice().sort(function(a,b){ return b.percent - a.percent; });
  var avg = list.length ? Math.round(list.reduce(function(s,p){return s+p.percent;},0)/list.length) : 0;
  var top = sorted[0];
  var mostHours = list.slice().sort(function(a,b){ return (b.totalWorkHours||0) - (a.totalWorkHours||0); })[0];
  var anyData = list.some(function(p){ return p.percent > 0; });

  var html = '';
  if (!anyData) {
    html += '<div class="empty-hint">Belum ada data kinerja untuk bulan ' + monthLabel(bulan) + '. Grafik akan otomatis terisi begitu tim mulai input lewat form harian.</div>';
  }

  html += '<div class="cards">'
    + '<div class="kpi"><div class="lbl">Bulan</div><div class="val small">' + monthLabel(bulan) + '</div></div>'
    + '<div class="kpi"><div class="lbl">Rata-Rata Tingkat Kepatuhan</div><div class="val">' + avg + '%</div></div>'
    + '<div class="kpi"><div class="lbl">Personel Terbaik dari Kinerja Harian</div><div class="val small">' + (top ? top.nama + ' (' + top.percent + '%)' : '-') + '</div></div>'
    + '<div class="kpi"><div class="lbl">Personel Jam Kerja Terbanyak</div><div class="val small">' + (mostHours && mostHours.totalWorkHours ? mostHours.nama + ' (' + mostHours.totalWorkHours + ' jam)' : '-') + '</div></div>'
    + '</div>';

  html += '<div class="panel">'
    + '<h3>Perbandingan Kinerja 8 Personel</h3>'
    + '<p class="panel-sub">Ketuk salah satu bar untuk melihat detail harian personel tersebut &middot; ' + monthLabel(bulan) + '</p>'
    + '<div class="chart-wrap tall"><canvas id="chart-team"></canvas></div>'
    + '</div>';

  html += '<div class="panel">'
    + '<h3>Ranking Tim</h3>'
    + '<div class="table-scroll"><table><thead><tr><th>#</th><th>Personel</th><th>Hari Kerja Terhitung</th><th>Kepatuhan</th><th>Total Jam Kerja</th></tr></thead><tbody id="rank-body"></tbody></table></div>'
    + '</div>';

  document.getElementById("content").innerHTML = html;

  var tbody = document.getElementById("rank-body");
  tbody.innerHTML = sorted.map(function(p, i){
    return '<tr class="clickable" data-nama="' + p.nama + '">'
      + '<td>' + (i+1) + '</td>'
      + '<td><strong>' + p.nama + '</strong></td>'
      + '<td>' + p.countedDays + ' hari</td>'
      + '<td><div class="barcell"><div class="track"><div class="fill ' + pctClass(p.percent) + '" style="width:' + p.percent + '%"></div></div><div class="pct">' + p.percent + '%</div></div></td>'
      + '<td>' + formatJamDetail(p.totalWorkHours) + '</td>'
      + '</tr>';
  }).join("");
  tbody.querySelectorAll("tr").forEach(function(tr){
    tr.addEventListener("click", function(){ selectPerson(tr.getAttribute("data-nama")); });
  });

  var isMobile = window.innerWidth < 640;
  var ctx = document.getElementById("chart-team").getContext("2d");
  if (teamChart) teamChart.destroy();
  teamChart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: sorted.map(function(p){ return p.nama; }),
      datasets: [{
        label: "Kepatuhan (%)",

function wireBmNote(nama, bulan){
  var txt = document.getElementById("bm-note-text");
  var status = document.getElementById("bm-note-status");
  var btn = document.getElementById("btn-save-note");
  if (!txt || !btn) return;
  var localKey = "bmNote_" + nama + "_" + bulan;
  if (!txt.value) {
    try { var saved = localStorage.getItem(localKey); if (saved) txt.value = saved; } catch(e){}
  }
  btn.addEventListener("click", function(){
    var val = txt.value;
    try { localStorage.setItem(localKey, val); } catch(e){}
    btn.disabled = true;
    status.textContent = "Menyimpan...";
    fetch(WEBAPP_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action: "saveBmNote", nama: nama, month: bulan, note: val })
    })
      .then(function(r){ return r.json(); })
      .then(function(res){
        btn.disabled = false;
        status.textContent = "Tersimpan " + new Date().toLocaleTimeString("id-ID");
      })
      .catch(function(){
        btn.disabled = false;
        status.textContent = "Tersimpan lokal — server belum merespons, sinkron otomatis nanti";
      });
  });
}

function getPerformanceLabelDash(percent){
  if (percent >= 90) return { text: "SANGAT BAIK", cls: "sb" };
  if (percent >= 75) return { text: "BAIK", cls: "b" };
  return { text: "CUKUP", cls: "c" };
}

function weakestIndicator(stats){
  if (!stats.length) return "-";
  var s = stats.slice().sort(function(a,b){return a.percent-b.percent;})[0];
  return s.label + " (" + s.percent + "%)";
}
function strongestIndicator(stats){
  if (!stats.length) return "-";
  var s = stats.slice().sort(function(a,b){return b.percent-a.percent;})[0];
  return s.label + " (" + s.percent + "%)";
}

function parseEvidenceDash(raw){
  if (!raw) return null;
  try {
    var obj = JSON.parse(raw);
    if (obj && typeof obj === "object") return obj;
  } catch(e){}
  return raw;
}

function renderEvidenceHtml(raw){
  var parsed = parseEvidenceDash(raw);
  if (!parsed) return '';
  if (typeof parsed === "string") {
    return parsed.replace(/</g,"&lt;");
  }
  function rowsHtml(obj){
    return Object.keys(obj).map(function(k){
      var v = obj[k];
      return '<div class="ev-row"><span class="ev-k">' + String(k).replace(/</g,"&lt;") + '</span><span class="ev-v">' + (v ? String(v).replace(/</g,"&lt;") : "-") + '</span></div>';
    }).join("");
  }
  if (Array.isArray(parsed)) {
    return parsed.map(function(rowObj, idx){
      return '<div class="ev-title">Baris ' + (idx+1) + '</div>' + rowsHtml(rowObj);
    }).join("");
  }
  return rowsHtml(parsed);
}

function openDayModal(nama, d, labels){
  var backdrop = document.getElementById("modal-backdrop");
  var body = document.getElementById("modal-body");
  var canShowEvidence = (nama !== "ASTRID");

  var items = labels.map(function(lbl, i){
    var v = d.values[i];
    var evi = (d.evidence && d.evidence[i]) ? d.evidence[i] : "";
    var badge = !d.isWorkday ? '<span class="daybadge na">-</span>' : (v ? '<span class="daybadge ok">Ya</span>' : '<span class="daybadge low">Tidak</span>');
    var hasEvidence = canShowEvidence && d.isWorkday && v && evi;

    if (!hasEvidence) {
      return '<div class="mitem-block"><div class="mitem"><span>' + lbl + '</span>' + badge + '</div></div>';
    }

    var eviHtml = renderEvidenceHtml(evi);
    return '<div class="mitem-block clickable" data-idx="' + i + '">'
      + '<div class="mitem"><span><span class="chev">&#9656;</span>' + lbl + '</span>' + badge + '</div>'
      + '<div class="mitem-evi">' + eviHtml + '</div>'
      + '</div>';
  }).join("");

  body.innerHTML = '<h4>' + nama + '</h4>'
    + '<p class="modal-sub">' + d.tanggal.split("-").reverse().join("/") + ' (' + WEEKDAY_NAMES[d.weekday] + ')' + (d.isWorkday ? '' : ' &middot; Bukan hari kerja') + '</p>'
    + items
    + '<button class="modal-close" id="modal-close-btn">Tutup</button>';

  backdrop.classList.add("show");
  isModalOpen = true;

  body.querySelectorAll(".mitem-block.clickable").forEach(function(block){
    block.addEventListener("click", function(e){
      if (e.target.id === "modal-close-btn") return;
      block.classList.toggle("expanded");
    });
  });

  function closeModal(){ backdrop.classList.remove("show"); isModalOpen = false; }
  document.getElementById("modal-close-btn").addEventListener("click", closeModal);
  backdrop.addEventListener("click", function(e){ if (e.target === backdrop) closeModal(); });
}

var BASE_SITE_URL = "https://mkimakassar84-dev.github.io/KPI-Personel-Cabang-Makassar/";
var _html2canvasPromise = null;

function loadHtml2Canvas(){
  if (window.html2canvas) return Promise.resolve();
  if (_html2canvasPromise) return _html2canvasPromise;
  _html2canvasPromise = new Promise(function(resolve, reject){
    var s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
  return _html2canvasPromise;

function roundRectDash(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function buildOverviewImage(list, bulan){
  var sorted = list.slice().sort(function(a,b){ return b.percent - a.percent; });
  var avg = list.length ? Math.round(list.reduce(function(s,p){return s+p.percent;},0)/list.length) : 0;
  var top = sorted[0];
  var mostHours = list.slice().sort(function(a,b){ return (b.totalWorkHours||0) - (a.totalWorkHours||0); })[0];

  var scale = 2, W = 760, padX = 28, rowH = 56;
  var headerH = 108;
  var cardsH = 92, cardsGap = 14;
  var chartH = 260;
  var rankHeaderH = 46;
  var footerH = 54;
  var sectionGap = 22;

  var H = headerH + sectionGap
    + cardsH + sectionGap
    + 28 + chartH + sectionGap   // chart title + chart
    + rankHeaderH + sorted.length*rowH + sectionGap
    + footerH;

  var canvas = document.createElement("canvas");
  canvas.width = W*scale; canvas.height = H*scale;
  var ctx = canvas.getContext("2d");
  ctx.scale(scale, scale);

  // background
  ctx.fillStyle = "#eef1f5"; ctx.fillRect(0,0,W,H);

  // header
  ctx.fillStyle = "#1c2733"; ctx.fillRect(0,0,W,headerH);
  ctx.fillStyle = "#fff"; ctx.font = "700 22px -apple-system, Roboto, Arial, sans-serif";
  ctx.fillText("Rekap Kinerja Tim Makassar", padX, 44);
  ctx.font = "400 13px -apple-system, Roboto, Arial, sans-serif";
  ctx.fillStyle = "rgba(255,255,255,0.75)";
  ctx.fillText("PT. Mitra Kabel Indonesia — Cabang Makassar · Bulan Berjalan Saat Ini", padX, 66);
  ctx.font = "700 15px -apple-system, Roboto, Arial, sans-serif";
  ctx.fillStyle = "#fff";
  ctx.fillText(monthLabel(bulan), padX, 90);

  var y = headerH + sectionGap;

  // card boxes row (Bulan / Rata-Rata / Terbaik / Jam Terbanyak)
  var cardGapX = 12;
  var cardW = (W - 2*padX - 3*cardGapX) / 4;
  function drawSmallCard(x, w, label, value, valColor){
    ctx.fillStyle = "#fff";
    roundRectDash(ctx, x, y, w, cardsH, 14); ctx.fill();
    ctx.fillStyle = "#7a8794"; ctx.font = "700 9.5px -apple-system, Roboto, Arial, sans-serif";
    var upLabel = label.toUpperCase();
    ctx.fillText(upLabel, x+14, y+22);
    ctx.fillStyle = valColor || "#1c2733"; ctx.font = "800 17px -apple-system, Roboto, Arial, sans-serif";
    var vLines = wrapLinesGeneric(ctx, value, w-28, "800 17px -apple-system, Roboto, Arial, sans-serif");
    var vy = y+46;
    vLines.slice(0,2).forEach(function(l){ ctx.fillText(l, x+14, vy); vy += 20; });
  }
  drawSmallCard(padX, cardW, "Bulan", monthLabel(bulan));
  drawSmallCard(padX + (cardW+cardGapX)*1, cardW, "Rata-Rata Kepatuhan", avg + "%", avg>=80?"#3fae63":(avg>=50?"#e0a53f":"#e05a4e"));
  drawSmallCard(padX + (cardW+cardGapX)*2, cardW, "Terbaik Kinerja Harian", top ? (top.nama + " (" + top.percent + "%)") : "-");
  drawSmallCard(padX + (cardW+cardGapX)*3, cardW, "Jam Kerja Terbanyak", mostHours ? (mostHours.nama + " — " + formatJamDetail(mostHours.totalWorkHours)) : "-");

  y += cardsH + sectionGap;

  // team comparison chart (reuse live Chart.js canvas)
  ctx.fillStyle = "#1c2733"; ctx.font = "700 14px -apple-system, Roboto, Arial, sans-serif";
  ctx.fillText("Perbandingan Kinerja 8 Personel", padX, y+18);
  y += 28;
  ctx.fillStyle = "#fff";
  roundRectDash(ctx, padX, y, W-2*padX, chartH, 14); ctx.fill();
  var teamCanvas = document.getElementById("chart-team");
  if (teamCanvas && teamCanvas.width > 0) {
    var pad = 14;
    ctx.drawImage(teamCanvas, padX+pad, y+pad, W-2*padX-2*pad, chartH-2*pad);
  }
  y += chartH + sectionGap;

  // ranking table
  ctx.fillStyle = "#1c2733"; ctx.font = "700 14px -apple-system, Roboto, Arial, sans-serif";
  ctx.fillText("Ranking Tim", padX, y+18);
  y += rankHeaderH;

  sorted.forEach(function(p, i){
    ctx.fillStyle = "#ffffff";
    roundRectDash(ctx, padX-8, y-30, W-2*(padX-8), rowH-10, 12);
    ctx.fill();

    var barColor = p.percent>=80 ? "#3fae63" : (p.percent>=50 ? "#e0a53f" : "#e05a4e");
    ctx.fillStyle = "#eef1f5";
    roundRectDash(ctx, padX+34, y-6, W-2*padX-190, 8, 4); ctx.fill();
    ctx.fillStyle = barColor;
    var barW = Math.max(6, (W-2*padX-190) * (p.percent/100));
    roundRectDash(ctx, padX+34, y-6, barW, 8, 4); ctx.fill();

    ctx.fillStyle = "#1c2733"; ctx.font = "800 13px -apple-system, Roboto, Arial, sans-serif";
    ctx.textAlign = "left";
    ctx.fillText("#" + (i+1), padX+2, y-14);
    ctx.font = "700 14px -apple-system, Roboto, Arial, sans-serif";
    ctx.fillText(p.nama, padX+34, y-14);

    ctx.textAlign = "right"; ctx.font = "800 15px -apple-system, Roboto, Arial, sans-serif";
    ctx.fillStyle = barColor;
    ctx.fillText(p.percent + "%", W-padX, y-14);
    ctx.font = "400 10.5px -apple-system, Roboto, Arial, sans-serif";
    ctx.fillStyle = "#9aa5b1";
    ctx.fillText(formatJamDetail(p.totalWorkHours), W-padX, y+8);
    ctx.textAlign = "left";

    y += rowH;
  });

  y += sectionGap - 10;

  ctx.fillStyle = "#5b7fa6"; ctx.font = "600 11px -apple-system, Roboto, Arial, sans-serif";
  ctx.fillText("Lihat detail lengkap (tanpa filter): " + BASE_SITE_URL + "rekap-kinerja-tim.html", padX, y+10);
  ctx.fillStyle = "#9aa5b1"; ctx.font = "400 11px -apple-system, Roboto, Arial, sans-serif";
  ctx.fillText("Dibuat otomatis dari sistem KPI Cabang Makassar", padX, y+30);

  return new Promise(function(resolve){ canvas.toBlob(function(b){ resolve(b); }, "image/png", 0.95); });
}

function wrapLinesGeneric(ctx, text, maxWidth, font){
  var prevFont = ctx.font;
  ctx.font = font;
  var words = String(text).split(" "); var lines = []; var cur = "";
  words.forEach(function(w){
    var test = cur ? cur + " " + w : w;
    if (ctx.measureText(test).width > maxWidth && cur) { lines.push(cur); cur = w; }
    else cur = test;
  });
  if (cur) lines.push(cur);
  ctx.font = prevFont;
  return lines;
}

  var weakLines = wrapLinesGeneric(tempCtx, weakTxt, W-2*padX-32, "600 13px -apple-system, Roboto, Arial, sans-serif");
  var strongLines = wrapLinesGeneric(tempCtx, strongTxt, W-2*padX-32, "600 13px -apple-system, Roboto, Arial, sans-serif");

  var cardsH = 96, cardsGap = 12;
  var sectionGap = 22;
  var chartTitleH = 26;

  var indicatorBlockH = 56 + (weakLines.length + strongLines.length) * 18 + 16;
  var footerH = 36;

  var H = headerH + sectionGap
    + cardsH + sectionGap
    + chartTitleH + trendChartH + sectionGap
    + chartTitleH + indicatorChartH + sectionGap
    + indicatorBlockH + sectionGap
    + footerH;

  canvas.width = W*scale; canvas.height = H*scale;
  var ctx = canvas.getContext("2d");
  ctx.scale(scale, scale);

  ctx.fillStyle = "#eef1f5"; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = "#1c2733"; ctx.fillRect(0,0,W,headerH);
  ctx.fillStyle = "#fff"; ctx.font = "700 21px -apple-system, Roboto, Arial, sans-serif";
  ctx.fillText("Rekap Kinerja " + nama, padX, 44);
  ctx.font = "400 13px -apple-system, Roboto, Arial, sans-serif";
  ctx.fillStyle = "rgba(255,255,255,0.75)";
  ctx.fillText("PT. Mitra Kabel Indonesia — Cabang Makassar", padX, 66);
  ctx.font = "700 14px -apple-system, Roboto, Arial, sans-serif";
  ctx.fillStyle = "#fff";
  ctx.fillText(monthLabel(bulan), padX, 90);

  var y = headerH + sectionGap;
  var cardW = (W - 2*padX - cardsGap) / 2;

  function drawCard(x, w, label, value, valColor){
    ctx.fillStyle = "#fff";
    roundRectDash(ctx, x, y, w, cardsH, 14); ctx.fill();
    ctx.fillStyle = "#7a8794"; ctx.font = "700 10px -apple-system, Roboto, Arial, sans-serif";
    ctx.fillText(label.toUpperCase(), x+16, y+26);
    ctx.fillStyle = valColor || "#1c2733"; ctx.font = "800 24px -apple-system, Roboto, Arial, sans-serif";
    ctx.fillText(value, x+16, y+60);
  }
  var lblColor = lbl.cls==="sb" ? "#3fae63" : (lbl.cls==="b" ? "#5b7fa6" : "#a97417");
  drawCard(padX, cardW, "Kepatuhan Bulan Ini", detail.monthPercent + "%", null);
  drawCard(padX + cardW + cardsGap, cardW, "Predikat", lbl.text, lblColor);

  y += cardsH + sectionGap;

  // trend chart (reuse live Chart.js canvas)
  ctx.fillStyle = "#1c2733"; ctx.font = "700 14px -apple-system, Roboto, Arial, sans-serif";
  ctx.fillText("Tren Kepatuhan Bulanan", padX, y+18);
  y += chartTitleH;
  ctx.fillStyle = "#fff";
  roundRectDash(ctx, padX, y, W-2*padX, trendChartH, 14); ctx.fill();
  var trendCanvas = document.getElementById("chart-trend");
  if (trendCanvas && trendCanvas.width > 0) {
    var padT = 14;
    ctx.drawImage(trendCanvas, padX+padT, y+padT, W-2*padX-2*padT, trendChartH-2*padT);
  }
  y += trendChartH + sectionGap;

  // indicator chart
  ctx.fillStyle = "#1c2733"; ctx.font = "700 14px -apple-system, Roboto, Arial, sans-serif";
  ctx.fillText("Kepatuhan per Indikator", padX, y+18);
  y += chartTitleH;
  ctx.fillStyle = "#fff";
  roundRectDash(ctx, padX, y, W-2*padX, indicatorChartH, 14); ctx.fill();
  var indCanvas = document.getElementById("chart-indicator");
  if (indCanvas && indCanvas.width > 0) {
    var padI = 14;
    ctx.drawImage(indCanvas, padX+padI, y+padI, W-2*padX-2*padI, indicatorChartH-2*padI);
  }
  y += indicatorChartH + sectionGap;

  // indicator summary block
  ctx.fillStyle = "#fff";
  roundRectDash(ctx, padX, y, W-2*padX, indicatorBlockH, 14); ctx.fill();
  var iy = y + 26;
  ctx.fillStyle = "#3b5a7d"; ctx.font = "700 11px -apple-system, Roboto, Arial, sans-serif";
  ctx.fillText("HARI KERJA TERHITUNG: " + detail.countedDays + " HARI", padX+16, iy);
  iy += 26;
  ctx.fillStyle = "#e05a4e"; ctx.font = "700 11px -apple-system, Roboto, Arial, sans-serif";
  ctx.fillText("INDIKATOR TERLEMAH", padX+16, iy);
  iy += 18;
  ctx.fillStyle = "#1c2733"; ctx.font = "600 13px -apple-system, Roboto, Arial, sans-serif";
  weakLines.forEach(function(l){ ctx.fillText(l, padX+16, iy); iy += 18; });
  iy += 8;
  ctx.fillStyle = "#3fae63"; ctx.font = "700 11px -apple-system, Roboto, Arial, sans-serif";
  ctx.fillText("INDIKATOR TERKUAT", padX+16, iy);
  iy += 18;
  ctx.fillStyle = "#1c2733"; ctx.font = "600 13px -apple-system, Roboto, Arial, sans-serif";
  strongLines.forEach(function(l){ ctx.fillText(l, padX+16, iy); iy += 18; });

  y += indicatorBlockH + sectionGap - 8;
  ctx.fillStyle = "#9aa5b1"; ctx.font = "400 11px -apple-system, Roboto, Arial, sans-serif";
  ctx.fillText("Dibuat otomatis dari sistem KPI Cabang Makassar", padX, y);

  return new Promise(function(resolve){ canvas.toBlob(function(b){ resolve(b); }, "image/png", 0.95); });
}

function currentViewCaption(){
  var nama = document.getElementById("f-nama").value;
  var bulan = document.getElementById("f-bulan").value || currentYearMonth();
  var bulanTxt = monthLabel(bulan);
  if (nama === "__OVERVIEW__") {
    return { caption: "Rekap Kinerja Tim Makassar \u2013 Bulan Berjalan Saat Ini\n" + BASE_SITE_URL + "rekap-kinerja-tim.html" };
  }
  if (nama === "MAKASSAR") {
    return { caption: "Rekap Kinerja Cabang MAKASSAR - " + bulanTxt + "\nPT. Mitra Kabel Indonesia - Cabang Makassar\n" + BASE_SITE_URL + "input-makassar.html" };
  }
  return { caption: "Rekap Kinerja " + nama + " - " + bulanTxt + "\nPT. Mitra Kabel Indonesia - Cabang Makassar\nDetail harian: " + BASE_SITE_URL + "rekap-kinerja-tim.html?nama=" + nama + "&lock=1" };
}

async function shareBlob(blob, caption, btn, origText){
  btn.disabled = false;
  btn.textContent = origText;
  if (!blob) { showToastDash("Gagal membuat gambar", "err"); return; }
  var fileName = "rekap-kinerja-" + Date.now() + ".png";
  var file = new File([blob], fileName, { type: "image/png" });
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try { await navigator.share({ files: [file], text: caption }); } catch(e){}
  } else {
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = fileName;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(function(){ URL.revokeObjectURL(url); }, 3000);
    showToastDash("Browser ini tidak mendukung share langsung - gambar sudah diunduh", "err");
  }
}

document.getElementById("btn-wa-share-dash").addEventListener("click", async function(){
  var btn = this;
  var content = document.getElementById("content");
  if (!content || !content.innerHTML.trim()) { showToastDash("Tunggu data selesai dimuat dulu", "err"); return; }

  var nama = document.getElementById("f-nama").value;
  var bulan = document.getElementById("f-bulan").value || currentYearMonth();
  var key = cacheKey(nama, bulan);
  var cached = VIEW_CACHE[key];
  var info = currentViewCaption();

  btn.disabled = true;
  var origText = btn.textContent;
  btn.textContent = "Menyiapkan gambar...";

  try {
    if (nama === "__OVERVIEW__") {
      var blob = await buildOverviewImage(cached || [], bulan);
      await shareBlob(blob, info.caption, btn, origText);
    } else if (nama === "MAKASSAR") {
      await loadHtml2Canvas();
      var canvas = await html2canvas(content, { backgroundColor: "#eef1f5", scale: 2, useCORS: true });
      canvas.toBlob(function(b){ shareBlob(b, info.caption, btn, origText); }, "image/png", 0.95);
    } else {
      var detail = cached ? cached.detail : null;
      if (!detail) { btn.disabled=false; btn.textContent=origText; showToastDash("Data belum siap", "err"); return; }
      var blob2 = await buildPersonImage(nama, bulan, detail);
      await shareBlob(blob2, info.caption, btn, origText);
    }
  } catch(e){
    btn.disabled = false;
    btn.textContent = origText;
    showToastDash("Gagal membuat gambar halaman", "err");
  }
});

function showToastDash(msg, type){
  var t = document.createElement("div");
  t.className = "toast" + (type ? " " + type : "");
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(function(){ t.classList.add("show"); });
  setTimeout(function(){ t.classList.remove("show"); setTimeout(function(){ t.remove(); }, 300); }, 2600);
}

initFilters();
load();
if (!(new URLSearchParams(window.location.search).get("lock") === "1")) {
  setTimeout(prefetchAllPersons, 800);
}
</script>
